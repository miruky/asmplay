<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330" role="img" aria-labelledby="arch-title">
  <title id="arch-title">asmplay の構成図。エディタのソースをassembleが命令列に変換し、cpuのstepが1命令ずつ状態を進める。MachineViewがレジスタ・メモリ・出力の変化を描画し、main.tsが実行制御を束ねる。</title>
  <style>
    .name { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #1d211d; }
    .file { font: 11px ui-monospace, 'SF Mono', Menlo, monospace; fill: #687068; }
    .desc { font: 11px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #687068; }
    .label { font: 11px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #687068; }
    .caption { font: 12px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #687068; }
    .heading { font: 700 16px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #1d211d; }
    .box { fill: #ffffff; stroke: #d9ded9; stroke-width: 1.2; }
    .box-state { fill: #e6f4e9; stroke: #2b8a3e; }
    .flow { stroke: #9aa39a; fill: none; stroke-width: 1.6; }
    .arrow { fill: #9aa39a; }
    @media (prefers-color-scheme: dark) {
      .name, .heading { fill: #e6e9e5; }
      .file, .desc, .label, .caption { fill: #99a197; }
      .box { fill: #1a1e1a; stroke: #39413a; }
      .box-state { fill: #1c3a24; stroke: #69db7c; }
      .flow { stroke: #6a746a; }
      .arrow { fill: #6a746a; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 z" class="arrow"/>
    </marker>
  </defs>

  <text x="16" y="34" class="heading">asmplay の構成</text>

  <rect x="16" y="64" width="180" height="80" rx="10" class="box"/>
  <text x="106" y="92" text-anchor="middle" class="name">エディタ</text>
  <text x="106" y="110" text-anchor="middle" class="desc">アセンブリを書く</text>

  <rect x="256" y="64" width="200" height="80" rx="10" class="box"/>
  <text x="356" y="88" text-anchor="middle" class="name">assemble</text>
  <text x="356" y="106" text-anchor="middle" class="file">src/lib/asm.ts</text>
  <text x="356" y="124" text-anchor="middle" class="desc">命令列とエラー(行番号付き)</text>

  <rect x="516" y="64" width="190" height="80" rx="10" class="box box-state"/>
  <text x="611" y="88" text-anchor="middle" class="name">CPU</text>
  <text x="611" y="106" text-anchor="middle" class="file">src/lib/cpu.ts</text>
  <text x="611" y="124" text-anchor="middle" class="desc">step / run・8ビットの状態</text>

  <rect x="766" y="64" width="178" height="80" rx="10" class="box"/>
  <text x="855" y="88" text-anchor="middle" class="name">MachineView</text>
  <text x="855" y="106" text-anchor="middle" class="file">src/ui/machineview.ts</text>
  <text x="855" y="124" text-anchor="middle" class="desc">変化箇所を点滅で描画</text>

  <path d="M 196 104 H 250" class="flow" marker-end="url(#arrow)"/>
  <text x="223" y="94" text-anchor="middle" class="label">ソース</text>
  <path d="M 456 104 H 510" class="flow" marker-end="url(#arrow)"/>
  <text x="483" y="94" text-anchor="middle" class="label">Program</text>
  <path d="M 706 104 H 760" class="flow" marker-end="url(#arrow)"/>
  <text x="733" y="94" text-anchor="middle" class="label">StepChange</text>

  <rect x="256" y="204" width="200" height="60" rx="10" class="box"/>
  <text x="356" y="228" text-anchor="middle" class="name">サンプル</text>
  <text x="356" y="246" text-anchor="middle" class="file">src/lib/samples.ts</text>

  <rect x="516" y="204" width="190" height="60" rx="10" class="box"/>
  <text x="611" y="228" text-anchor="middle" class="name">実行制御</text>
  <text x="611" y="246" text-anchor="middle" class="file">src/main.ts</text>

  <path d="M 356 204 V 150" class="flow" marker-end="url(#arrow)"/>
  <text x="366" y="180" class="label">ソース差し替え</text>
  <path d="M 611 204 V 150" class="flow" marker-end="url(#arrow)"/>
  <text x="621" y="180" class="label">1命令 / 連続実行</text>

  <text x="16" y="310" class="caption">アセンブラとCPUはDOMに依存しない純粋なロジックで、命令の意味論とサンプルの実行結果はすべてテストで固定している。</text>
</svg>
